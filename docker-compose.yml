version: '3.8'
services:
  geminibot:
    build: .
    container_name: geminibot
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_TOKEN=${GEMINI_API_TOKEN}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - AUTHORIZED_USER=${AUTHORIZED_USER}
      - LANGUAGE=${LANGUAGE}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOW_ALL_USERS=${ALLOW_ALL_USERS:-false}
      - SAFETY_OVERRIDE=${SAFETY_OVERRIDE:-}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-30}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-200}
      - GEMINI_MAX_WORKERS=${GEMINI_MAX_WORKERS:-20}
      - MAX_HISTORY_MESSAGES=${MAX_HISTORY_MESSAGES:-100}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./data:/usr/src/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
